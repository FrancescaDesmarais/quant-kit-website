<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!--
    Square icon — same 3×3 grid, centred in 64×64 canvas
    Dot centres at 16, 32, 48 with r=6
    X-pattern of secondary brand colours, coral anchors bottom-right
  -->

  <!-- Row 1 -->
  <circle cx="16" cy="16" r="6" fill="#4682B4"/>
  <circle cx="32" cy="16" r="6" fill="#EAECED"/>
  <circle cx="48" cy="16" r="6" fill="#9370DB"/>

  <!-- Row 2 -->
  <circle cx="16" cy="32" r="6" fill="#EAECED"/>
  <circle cx="32" cy="32" r="6" fill="#228B22"/>
  <circle cx="48" cy="32" r="6" fill="#EAECED"/>

  <!-- Row 3 -->
  <circle cx="16" cy="48" r="6" fill="#9370DB"/>
  <circle cx="32" cy="48" r="6" fill="#EAECED"/>
  <circle cx="48" cy="48" r="6" fill="#FF6B6B"/>

</svg>
